<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APAE v2.0 - ANA</title>
    <link rel="stylesheet" href="design.css">
</head>
<body>
    <div class="ana-container">
        <header>
            <div class="logo">APAE v2.0</div>
            <div class="status-blink">● AUTONOMOUS ACTIVE</div>
        </header>

        <section class="prediction-module">
            <div class="label">TARGET NEXT PERIOD</div>
            <div id="target-period" class="period-num">----------</div>
            
            <div class="main-prediction">
                <span id="prediction-display">ANALYZING...</span>
            </div>
            
            <div class="meta-data">
                <span>Accuracy: <b id="confidence">0%</b></span>
                <span>Neural: Active</span>
            </div>
        </section>

        <div class="data-history-title">REAL-TIME DATA SENSING</div>
        <div id="live-stream" class="stream-box">
            </div>
    </div>
    <script src="ana-core.js"></script>
</body>
</html>
