<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Market Pattern Predictor</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-main: #c9d1d9;
            --accent: #58a6ff;
            --green: #238636;
            --red: #da3633;
            --violet: #8957e5;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 450px;
            text-align: center;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid #30363d;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header {
            font-size: 1.2rem;
            color: var(--accent);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .issue-box {
            font-size: 0.9rem;
            background: #21262d;
            padding: 8px 15px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 20px;
            border: 1px solid #30363d;
        }

        .prediction-label {
            font-size: 1rem;
            margin-bottom: 10px;
            opacity: 0.8;
        }

        .prediction-value {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 10px 0;
            transition: all 0.5s ease;
        }

        .details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #30363d;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 0.8rem;
            display: block;
            margin-bottom: 5px;
            color: #8b949e;
        }

        .stat-value {
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* Dynamic Colors */
        .color-green { color: var(--green); text-shadow: 0 0 20px rgba(35, 134, 54, 0.4); }
        .color-red { color: var(--red); text-shadow: 0 0 20px rgba(218, 54, 51, 0.4); }
        .color-violet { color: var(--violet); text-shadow: 0 0 20px rgba(137, 87, 229, 0.4); }
        .color-default { color: var(--text-main); }

        .loader {
            font-size: 12px;
            margin-top: 20px;
            color: #484f58;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="header">AI Pattern Analysis</div>
        <div class="issue-box" id="sync-issue">Syncing Data...</div>
        
        <div class="prediction-label">পরবর্তী সম্ভাব্য ফলাফল</div>
        <div id="prediction-box" class="prediction-value color-default">--</div>
        
        <div class="details">
            <div class="stat-item">
                <span class="stat-label">একুরেসি</span>
                <span class="stat-value" id="confidence">0%</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">হিস্ট্রি মিল</span>
                <span class="stat-value" id="history-count">0 বার</span>
            </div>
        </div>

        <div class="loader">
            স্ট্যাটাস: <span id="status">লাইভ ট্র্যাকিং সচল</span>
        </div>
    </div>
</div>

<script>
    async function updateDashboard() {
        try {
            // পাইথনের জেনারেট করা রেজাল্ট ফাইল থেকে ডেটা নিচ্ছে
            const response = await fetch('live_result.json?t=' + new Date().getTime());
            const data = await response.json();

            // ইস্যু আপডেট
            document.getElementById('sync-issue').innerText = "ইস্যু: " + data.sync_issue;
            
            // প্রেডিকশন এবং কালার আপডেট
            const predBox = document.getElementById('prediction-box');
            const colorClass = data.color.toLowerCase();
            
            predBox.innerText = data.color + " (" + data.prediction + ")";
            predBox.className = "prediction-value color-" + colorClass;

            // স্ট্যাটাস আপডেট
            document.getElementById('confidence').innerText = data.confidence;
            document.getElementById('history-count').innerText = data.history_matches + " বার";
            
            document.getElementById('status').innerText = "ডেটা সিঙ্ক হয়েছে: " + new Date().toLocaleTimeString();

        } catch (error) {
            document.getElementById('status').innerText = "নতুন ডেটার জন্য অপেক্ষা করা হচ্ছে...";
        }
    }

    // প্রতি ৩ সেকেন্ড পর পর আপডেট চেক করবে
    setInterval(updateDashboard, 3000);
    updateDashboard();
</script>

</body>
</html>
